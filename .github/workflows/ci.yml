name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Min supported (ty's target) and a current interpreter.
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # --locked fails if uv.lock is out of sync with pyproject.toml, so a green
        # CI guarantees the committed lockfile actually resolves the declared deps.
        run: uv sync --locked --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      # Model-loading tests are skipped by default (no --run-model), so CI needs
      # no network model download.
      - name: Test (pytest)
        run: uv run pytest
