# Streamlit configuration for the openmed-studio app.
# Any local secrets belong in .streamlit/secrets.toml (gitignored), not here.

[browser]
# This app handles clinical text locally; don't send usage telemetry.
gatherUsageStats = false

[client]
# The model runs in-process; never render exception messages/tracebacks in the
# browser (they can contain note text). Full detail still goes to the server console.
showErrorDetails = "none"

# Both [theme.light] and [theme.dark] are defined so the app honors the user's
# light/dark preference (a single [theme] would lock it to one mode). The
# entity-highlight colors in ui_helpers.py adapt to whichever is active.
[theme]
primaryColor = "#2563eb"

[theme.light]
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f6f8fa"
textColor = "#1f2328"

[theme.dark]
primaryColor = "#60a5fa"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
